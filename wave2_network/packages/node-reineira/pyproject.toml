[project]
name = "blindference-node"
version = "0.1.0"
description = "Blindference node — install and run to participate in the protocol"
requires-python = ">=3.11"
license = { text = "BUSL-1.1" }
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "eth-account>=0.13",
    "eth-utils>=4.1",
    "web3>=6.18",
    "httpx>=0.27",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "structlog>=24.1",
    "typer>=0.12",
]

[project.scripts]
blindference-node = "blindference_node.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/blindference_node"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
markers = [
    "unit: pure-domain unit test, no I/O",
    "application: use-case test against fakes",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B", "UP", "SIM", "RUF"]
ignore = [
    "N818",  # DDD domain exceptions read better without Error suffix
    "B008",  # Typer/Path.home() in defaults is the typer-recommended CLI pattern
]

[tool.mypy]
python_version = "3.11"
strict = true
