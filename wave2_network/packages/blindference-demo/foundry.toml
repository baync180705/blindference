[profile.default]
src = "contracts"
out = "out"
libs = ["../contracts/node_modules", "../../node_modules"]
allow_paths = ["../contracts"]
test = "test"
script = "script"
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = false
ast = true
build_info = true
extra_output = ["storageLayout"]
fs_permissions = [{access = "read", path = "./"}]
remappings = [
  "@openzeppelin/contracts/=../contracts/node_modules/@openzeppelin/contracts/",
  "@openzeppelin/contracts-upgradeable/=../contracts/node_modules/@openzeppelin/contracts-upgradeable/",
  "@fhenixprotocol/cofhe-contracts/=../contracts/node_modules/@fhenixprotocol/cofhe-contracts/",
  "@fhenixprotocol/cofhe-mock-contracts/=../contracts/node_modules/@fhenixprotocol/cofhe-mock-contracts/",
  "forge-std/=../contracts/node_modules/forge-std/src/",
  "hardhat/=../contracts/node_modules/forge-std/src/",

  # Blindference protocol contracts (sibling package)
  "@blindference/contracts/=../contracts/contracts/",

  # === TECH DEBT (chaosenet) ===
  # Reineira artifacts vendored in @blindference/contracts/_reineira_stubs/
  # See ../contracts/contracts/interfaces/TECH-DEBT.md for chaosenet migration.
  "@reineira-os/shared/=../contracts/contracts/_reineira_stubs/"
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "preserve"
multiline_func_header = "attributes_first"
single_line_statement_blocks = "multi"
override_spacing = false
wrap_comments = false
